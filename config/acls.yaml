# AegisClaw ACL Configuration
# Loaded by AegisHub with hot-reload. Default-deny: only listed (source,dest,cmd) patterns allowed.
# Wildcards: "*" for any; "prefix*" for prefix match (e.g. "memory.*", "court-persona-*").
# All inter-VM traffic after registration is signed+ACL-checked (AEGIS_DEV_MODE=1 allows dummy sigs for tests/dev).
# Register handshake and some hub control msgs have special handling before full ACL.

rules:
# --- Test harness (client1 <-> client2 via hub) ---
- source: client1
  destination: client2
  commands:
    - test
- source: client2
  destination: client1
  commands:
    - test

# --- Legacy/compat (kept for transition; prefer explicit below) ---
- source: agent1
  destination: memory
  commands:
    - memory.*

# --- Daemon <-> everything (Phase 1 TCB bootstrap, versions, control) ---
- source: daemon
  destination: "*"
  commands:
    - version
    - get-version
    - "*"
# Ephemeral hub RPC connections from sendToComponentViaHub (host chat/sessions proxy)
- source: aegis-daemon-temp
  destination: "*"
  commands:
    - "*"
- source: aegis-daemon-temp-*
  destination: "*"
  commands:
    - "*"
- source: daemon-temp-*
  destination: "*"
  commands:
    - "*"
- source: "agent*"
  destination: aegis-daemon-temp
  commands:
    - response
    - "*"
- source: "agent*"
  destination: aegis-daemon-temp-*
  commands:
    - response
    - "*"
- source: "agent*"
  destination: daemon-temp-*
  commands:
    - response
    - "*"
- source: "*"
  destination: daemon
  commands:
    - version
    - get-version

# --- All components <-> Hub for versions, discovery (hub special-cases some) ---
- source: "*"
  destination: hub
  commands:
    - version
    - get-version
    - component.list
    - tool.list

# --- Phase 3: Agent Runtime 6-step loop + Memory + Court flows ---
# Agent <-> Memory (context, store/search per memory-vm.md)
- source: agent
  destination: memory
  commands:
    - memory.*
- source: memory
  destination: agent
  commands:
    - memory.*

# Phase 1.1c: Support multiple concurrent agent/memory instances (real per-session Firecracker microVMs).
# Use wildcards so "agent-*" and "memory-*" (assigned at registration) are allowed.
# This is additive and does not change behavior for the legacy "agent"/"memory" singleton names.
# See aegishub.md §ACL Management + agent-runtime.md §Communication.
- source: "agent*"
  destination: "memory*"
  commands:
    - memory.*
- source: "memory*"
  destination: "agent*"
  commands:
    - memory.*

# Agent <-> Store (proposals, and responses)
- source: agent
  destination: store
  commands:
    - proposal.*
- source: store
  destination: agent
  commands:
    - proposal.*
- source: "agent*"
  destination: store
  commands:
    - proposal.*
- source: store
  destination: "agent*"
  commands:
    - proposal.*

# Agent <-> Network Boundary (LLM calls via signed, for callLLMWithFallback and tool use)
- source: agent
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: agent
  commands:
    - llm.*
# Per-session agent VMs (agent-<session>) use the same LLM path as the singleton name.
- source: "agent*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "agent*"
  commands:
    - llm.*

# On-demand SDLC role VMs (coder-<channel>, tester-<channel>, etc.) reuse agent.img but
# register as role-prefixed hub ids (not agent-*). Mirror agent LLM + store channel paths.
- source: "coder*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "coder*"
  commands:
    - llm.*
- source: "tester*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "tester*"
  commands:
    - llm.*
- source: "ciso*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "ciso*"
  commands:
    - llm.*
- source: "architect*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "architect*"
  commands:
    - llm.*
- source: "researcher*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "researcher*"
  commands:
    - llm.*

# Agent <-> Court Scribe (notify on proposal creation per governance)
- source: agent
  destination: court-scribe
  commands:
    - scribe.*
- source: "agent*"
  destination: court-scribe
  commands:
    - scribe.*

# Store <-> Court Scribe (notify on create, review_complete updates; per court-scribe.md + store)
- source: store
  destination: court-scribe
  commands:
    - scribe.notify_review
- source: court-scribe
  destination: store
  commands:
    - court.review_complete
    - court.*

# Court Personas (distinct sources: court-persona-ciso, court-persona-security-architect, etc.)
# Each pulls proposal content ONLY from Store (never via Scribe), submits votes to Scribe.
- source: court-persona-*
  destination: store
  commands:
    - proposal.get
    - proposal.data
    - channel.post
    - channel.get
    - channel.get_relevant_since
    - channel.get_messages
# Store RPC replies to court personas (channel.data, get_relevant_since.data, etc.)
- source: store
  destination: court-persona-*
  commands:
    - channel.*
    - proposal.*
- source: court-persona-*
  destination: court-scribe
  commands:
    - scribe.submit_vote
    - scribe.*
- source: court-persona-*
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: court-persona-*
  commands:
    - llm.*

# Phase 4: Store <-> Network Boundary for real encrypted secrets (secret-management.md + network-boundary.md)
- source: store
  destination: network-boundary
  commands:
    - secrets.push
    - secrets.update
- source: network-boundary
  destination: store
  commands:
    - secrets.response
    - secrets.*

# Scribe <-> Personas (for completeness; Scribe will send targeted notify_review to each)
- source: court-scribe
  destination: court-persona-*
  commands:
    - scribe.notify_review
    - scribe.*
# Turn-based propagation: Store notifies facilitator on every channel.post
- source: store
  destination: channel-facilitator
  commands:
    - channel.updated
# Ephemeral facilitator RPC clients (channel.get → channel.data, member_turn_update acks)
- source: store
  destination: channel-facilitator-out-*
  commands:
    - channel.*

# Channel Facilitator ↔ Store (membership, last_seen_seq, turn tools, state)
# Per turn-based-message-propagation spec: facilitator owns round-robin + last_seen_seq.
# Narrowed: only the commands it issues (get for state, member_turn_update for persistence, post for status notes).
- source: channel-facilitator
  destination: store
  commands:
    - channel.get
    - channel.get_relevant_since
    - channel.get_messages
    - channel.member_turn_update
    - channel.post
    - channel.turn_state

# Facilitator delivers batched turns to agents (replaces human-only fan-out for agents)
- source: channel-facilitator
  destination: "*"
  commands:
    - channel.turn

# Agents report turn outcomes (posted / no_reply / error) to facilitator for observability (spec §8)
- source: "agent*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "coder*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "tester*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "ciso*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "architect*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "researcher*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: "project-manager*"
  destination: channel-facilitator
  commands:
    - channel.turn_result
- source: channel-facilitator
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*
- source: channel-facilitator-out-*
  destination: store
  commands:
    - channel.get
    - channel.get_relevant_since
    - channel.get_messages
    - channel.member_turn_update
    - channel.post
    - channel.turn_state
- source: channel-facilitator-out-*
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*
- source: channel-facilitator-out-*
  destination: "*"
  commands:
    - channel.turn

# Agents query relevance and message history via Store tools (turn-based propagation)
# Broad agent-* / role-* access accepted for v1 per spec.
- source: "agent*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
- source: "coder*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
    - channel.get
    - channel.post
- source: "tester*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
    - channel.get
    - channel.post
- source: "ciso*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
    - channel.get
    - channel.post
- source: "architect*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
    - channel.get
    - channel.post
- source: "researcher*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
    - channel.get
    - channel.post
- source: "court-persona-*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages
- source: "project-manager*"
  destination: store
  commands:
    - channel.get_relevant_since
    - channel.get_messages

# Channel activity fan-out (Store relays every channel.post → daemon-orchestrator → STOMP only)
- source: store
  destination: "daemon-orchestrator"
  commands:
    - channel.relay_activity
    - channel.*
- source: web-portal
  destination: "daemon-orchestrator"
  commands:
    - channel.fanout
- source: "daemon-orchestrator"
  destination: court-persona-*
  commands:
    - channel.activity
    - channel.member_notify
- source: "daemon-orchestrator"
  destination: "project-manager*"
  commands:
    - channel.activity
    - channel.member_notify
# Legacy CLI/daemon direct delivery (if relay bypassed during tests)
- source: "aegis-cli-internal*"
  destination: court-persona-*
  commands:
    - channel.activity
    - channel.member_notify
- source: "aegis-cli-internal"
  destination: court-persona-*
  commands:
    - channel.activity
    - channel.member_notify
- source: "daemon-internal*"
  destination: court-persona-*
  commands:
    - channel.activity
    - channel.member_notify
- source: "daemon-internal-*"
  destination: court-persona-*
  commands:
    - channel.activity
    - channel.member_notify
- source: "aegis-cli-internal*"
  destination: "project-manager*"
  commands:
    - channel.activity
    - channel.member_notify
- source: "aegis-cli-internal"
  destination: "project-manager*"
  commands:
    - channel.activity
    - channel.member_notify
- source: "daemon-internal*"
  destination: "project-manager*"
  commands:
    - channel.activity
    - channel.member_notify
- source: "daemon-internal-*"
  destination: "project-manager*"
  commands:
    - channel.activity
    - channel.member_notify

# Teams (lightweight collaboration - Phase 5 slice)
# Web Portal and CLI can create/list teams and send messages
- source: web-portal
  destination: store
  commands:
    - team.create
    - team.list
    - team.get
    - team.message
    - team.*
    - sessions.list
    - sessions.create
    - sessions.history
    - sessions.get
    - sessions.save
    - sessions.*
- source: aegis
  destination: store
  commands:
    - team.*

# Channels (collaboration model - channels + roles + PM)
# Minimal: create/list/get/join/post for membership + history (Store owns durable state)
- source: web-portal
  destination: store
  commands:
    - channel.create
    - channel.list
    - channel.get
    - channel.join
    - channel.post
    - channel.*
    - skill.*
    - proposal.*
- source: store
  destination: web-portal
  commands:
    - "*"
- source: aegis
  destination: store
  commands:
    - channel.*
# Future: PM, SDLC roles, and agents will post to channels too
- source: "agent*"
  destination: store
  commands:
    - channel.*
- source: "project-manager*"
  destination: store
  commands:
    - channel.*
- source: "project-manager*"
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*

# daemon-orchestrator (the receiver started early in daemon) needs to do channel.* to store
# for the E2E auto-default "main" channel + Court members setup (best-effort, idempotent).
# This prevents ACL violations and "temp" spam from the auto go func during startup.
# Source is the persistent "daemon-orchestrator" client (we updated the auto code to use it
# instead of always creating new daemon-internal-* clients via sendToComponentViaHub).
- source: "daemon-orchestrator"
  destination: store
  commands:
    - channel.*

# Host CLI path for `aegis pm goal` (and internal ensure sends) talks to the receiver as
# daemon-internal-N (fresh per `aegis` process). Allow ensure.role / orchestrator.* so the
# CLI-driven collaboration path (pm goal → ensure for PM + dynamic roles with channel=) works
# without ACL blocks (parallel to the project-manager* rule below).
- source: "daemon-internal*"
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*
- source: "daemon-internal-*"
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*

# The second half of the CLI pm goal path: after ensuring the project-manager (with channel),
# the CLI sends the actual "user.goal" (containing the channel hint and goal text) to the
# project-manager component (registered as "project-manager", or the ensured "project-manager-xxx"
# ID). This was the ACL violation observed in manual verification runs after the other collab
# ACLs were added: "daemon-internal-N -> project-manager : user.goal".
# Without this, the PM never receives the goal, returns empty response, never posts the plan
# or does the dynamic ensure.role for coder/tester, and channel gets time out or show nothing.
- source: "daemon-internal*"
  destination: "project-manager*"
  commands:
    - user.goal
    - chat.message
- source: "daemon-internal-*"
  destination: "project-manager*"
  commands:
    - user.goal
    - chat.message

# aegis-cli-internal-*: one persistent hub client per short-lived CLI process (unique per pid).
# Replaces per-send daemon-internal-N ephemeral registrations during E2E polls.
- source: "aegis-cli-internal*"
  destination: store
  commands:
    - channel.*
    - timer.*
    - sessions.*
    - proposal.*   # allow CLI "skills propose" (and list/get) to reach Store proposal surface (per sdlc-commands + store-vm)
- source: "aegis-cli-internal*"
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*
- source: "aegis-cli-internal*"
  destination: "project-manager*"
  commands:
    - user.goal
    - chat.message
- source: store
  destination: "aegis-cli-internal*"
  commands:
    - "*"
# Legacy exact id (older binaries):
- source: "aegis-cli-internal"
  destination: store
  commands:
    - channel.*
    - timer.*
    - sessions.*
    - proposal.*   # legacy exact: allow CLI propose path to Store (sdlc)
- source: "aegis-cli-internal"
  destination: "daemon-orchestrator"
  commands:
    - ensure.role
    - orchestrator.*
- source: "aegis-cli-internal"
  destination: "project-manager*"
  commands:
    - user.goal
    - chat.message
- source: store
  destination: "aegis-cli-internal"
  commands:
    - "*"

# daemon-internal: persistent client for the long-lived daemon process (bg probes, portal
# bridge, setupDefaultMainChannelAndMembers, SSE/dashboard, etc.). CLI uses aegis-cli-internal.
# daemon-internal-N (legacy ephemeral fallback; should no longer appear after persistent clients):
# (the readiness probe in startBase, setupDefaultMainChannelAndMembers for auto "main",
# status store probe, portal bridge internal sends, dashboard/SSE stats (timer.list + sessions.list + channel.list),
# chat sessions host, etc.). Each CLI invocation starts its local counter, so you often see "daemon-internal-1".
# They must be allowed channel.* / timer.* / sessions.* to store for readiness, status, dashboard,
# auto-main, channel ops, and collab paths. Without this, probes get ACL violations, the bg store-ready
# gate never succeeds (or times out), lazy Court never starts, base stays "launch attempted (Store still starting...)",
# and logs spam violations on every poll / 2s SSE tick during startup or steady state.
- source: "daemon-internal*"
  destination: store
  commands:
    - channel.*
    - timer.*
    - sessions.*
    - skill.*
    - proposal.*
    - permission.*
    - visibility.*
    - ciso.delegation.*
    - tool.registry.discover
    - audit.list
- source: "daemon-internal-*"
  destination: store
  commands:
    - channel.*
    - timer.*
    - sessions.*
    - skill.*
    - proposal.*
    - permission.*
    - visibility.*
    - ciso.delegation.*
    - tool.registry.discover
    - audit.list
# Store must be able to reply to (or in some flows originate toward) the ephemeral daemon-internal
# clients for the commands above (responses may carry the original command name in audit; observed
# as store -> daemon-internal-N : channel.list etc. during probes and dashboard collection).
# Grant broad "*" for these internal sources so status, auto-defaults, Court setup, PM ensure add_member,
# and portal stats all succeed without ACL noise once Store is bridged.
- source: store
  destination: "daemon-internal*"
  commands:
    - "*"
- source: store
  destination: "daemon-internal-*"
  commands:
    - "*"

# Store channel notifications to on-demand PM VMs (channel.updated / channel.posted relay)
- source: store
  destination: "project-manager*"
  commands:
    - channel.updated
    - channel.posted
    - channel.*

# Project Manager <-> Network Boundary for real LLM plan generation (same contract as agents; enables unmocked Ollama E2E via NewRealLLMCaller)
- source: "project-manager*"
  destination: network-boundary
  commands:
    - llm.*
- source: network-boundary
  destination: "project-manager*"
  commands:
    - llm.*

# Memory <-> Store (long-term persistence per memory-vm.md)
- source: memory
  destination: store
  commands:
    - memory.*
- source: store
  destination: memory
  commands:
    - memory.*

# --- Builder (Phase 4) ---
- source: builder
  destination: store
  commands:
    - git.clone
    - git.push
    - pr.create
    - pr.update
    - skill.register
    - audit.append
    - proposal.*
    - build.complete
    - build.failed
    - builder.build_proposal
- source: store
  destination: builder
  commands:
    - git.cloned
    - git.pushed
    - pr.created
    - pr.updated
    - skill.registered
    - proposal.*
    - builder.build_proposal
    - build.complete
    - build.failed

# --- Web Portal / Dashboard (Phase 5, via internal/dashboard + thin proxy) ---
- source: web-portal
  destination: hub
  commands:
    - "*"
- source: hub
  destination: web-portal
  commands:
    - "*"
# web-portal talks to the Host Daemon (via hub) for the bulk of dashboard actions
# (chat.*, approvals.*, system.stats, etc.). The daemon then fans out as needed.
- source: web-portal
  destination: daemon
  commands:
    - "*"
# Chat turns go to the agent chat system (agent-runtime.md); portal bridge also routes chat.* here.
- source: web-portal
  destination: agent
  commands:
    - chat.*
    - chat.message
    - user.turn
- source: web-portal
  destination: "agent*"
  commands:
    - chat.*
    - chat.message
    - user.turn

# --- Permissions & Capability Grants (permissions-model.md) ---
# Hub fetches/pushes permission snapshots; Store owns durable grants + visibility.
- source: hub
  destination: store
  commands:
    - permission.snapshot
    - permission.panel
    - permission.request
    - permission.grant
    - permission.revoke
    - permission.list
    - permission.check
    - permission.requests.list
    - visibility.list
    - visibility.get
    - visibility.set
- source: "hub-perm-fetch"
  destination: store
  commands:
    - permission.snapshot
    - permission.request
- source: store
  destination: hub
  commands:
    - permission.snapshot
    - permission.granted
    - permission.revoked
    - permission.request
    - visibility.set
- source: store
  destination: "hub-perm-fetch"
  commands:
    - permission.snapshot
    - error
    - response
# Hub pushes snapshots to agent microVMs
- source: hub
  destination: "agent*"
  commands:
    - permission.snapshot
- source: hub
  destination: "project-manager*"
  commands:
    - permission.snapshot
- source: hub
  destination: "coder*"
  commands:
    - permission.snapshot
# Portal + CLI manage grants (user-controlled)
- source: web-portal
  destination: store
  commands:
    - permission.grant
    - permission.revoke
    - permission.list
    - permission.panel
    - permission.check
    - permission.snapshot
    - permission.requests.list
    - visibility.set
    - visibility.get
    - visibility.list
    - ciso.delegation.get
    - ciso.delegation.set
- source: "daemon-internal*"
  destination: store
  commands:
    - permission.*
    - visibility.*
    - ciso.delegation.*
- source: "daemon-internal-*"
  destination: store
  commands:
    - permission.*
    - visibility.*
    - ciso.delegation.*
- source: "aegis-cli-internal*"
  destination: store
  commands:
    - permission.*
    - visibility.*
    - ciso.delegation.*
- source: "aegis-cli-internal"
  destination: store
  commands:
    - permission.*
    - visibility.*
# Agents may record permission requests (denied attempts) but never self-grant
- source: "agent*"
  destination: store
  commands:
    - permission.request
- source: "project-manager*"
  destination: store
  commands:
    - permission.request
- source: "coder*"
  destination: store
  commands:
    - permission.request
    - tool.registry.discover
# CISO personas (when delegation opt-in enabled) may propose grants/visibility
- source: "court-persona-ciso*"
  destination: store
  commands:
    - permission.*
    - visibility.*
    - permission.request
    - permission.grant
    - permission.revoke
    - visibility.set
    - ciso.delegation.get
# NOTE: ciso* deliberately NOT granted ciso.delegation.set (user/Settings via web-portal/daemon only; prevents self-opt-in per skeptic)
- source: "ciso*"
  destination: store
  commands:
    - permission.*
    - visibility.*
    - ciso.delegation.get

# --- Catch common response patterns (signed replies often mirror cmd names or use response/*) ---
# Broad but explicit for known components during Phase 3 iteration
- source: "*"
  destination: "*"
  commands:
    - response
    - error
    - ping
    - pong
    - version
    - get-version

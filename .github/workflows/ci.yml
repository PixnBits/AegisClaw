name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

  lightweight-integration-tests:
    name: Lightweight Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run lightweight integration tests
        run: go test ./cmd/aegis ./cmd/aegishub -count=1 -v -timeout 120s

  image-builds:
    name: Image Builds
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check image build script
        id: image_script
        run: |
          if [ -f scripts/build-microvms-docker.sh ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.image_script.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build tools
        if: steps.image_script.outputs.exists == 'true'
        run: sudo apt-get install -y e2fsprogs

      - name: Build all microVM rootfs images
        if: steps.image_script.outputs.exists == 'true'
        run: sudo ./scripts/build-microvms-docker.sh /tmp/rootfs-templates

      - name: Skip image build (script missing)
        if: steps.image_script.outputs.exists != 'true'
        run: echo "Skipping image-builds job because scripts/build-microvms-docker.sh is not present."

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Playwright
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          AEGIS_E2E_FIXTURE: '1'
        run: npm test

  live-test:
    name: Live Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check live test script
        id: live_script
        run: |
          if [ -f scripts/run-live-test.sh ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.live_script.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run live test
        if: steps.live_script.outputs.exists == 'true'
        run: ./scripts/run-live-test.sh --yes

      - name: Skip live test (script missing)
        if: steps.live_script.outputs.exists != 'true'
        run: echo "Skipping live-test job because scripts/run-live-test.sh is not present."

  # In-process integration tests are strictly opt-in — never run automatically.
  # Trigger manually via workflow_dispatch or add the "run-inprocess-tests" label
  # to a PR.
  #
  # SECURITY: These tests use InProcessTaskExecutor which has ZERO isolation.
  # They must NEVER be part of the default CI matrix or release pipelines.
  # See CONTRIBUTING.md for details.
  inprocess-tests:
    name: In-Process Integration Tests (opt-in only)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: contains(github.event.pull_request.labels.*.name, 'run-inprocess-tests')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run in-process integration tests
        env:
          AEGISCLAW_INPROCESS_TEST_MODE: unsafe_for_testing_only
        run: >
          go test ./cmd/aegisclaw/
          -tags=inprocesstest
          -run 'TestInProcess'
          -count=1
          -v
          -timeout 60s

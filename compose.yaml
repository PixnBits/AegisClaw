services:
  message-hub:
    build: src/skills/core/message-hub
    # Security hardening (add more as we go)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CONTROL_ADDR=host.docker.internal:50023
